name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @clawgame/engine typecheck
      - run: pnpm --filter @clawgame/engine test
      - run: pnpm --filter @clawgame/phaser-runtime lint
      - run: pnpm --filter @clawgame/phaser-runtime test
      - run: pnpm --filter @clawgame/web typecheck
      - run: pnpm --filter @clawgame/web test
      - run: pnpm --filter @clawgame/api typecheck
      - run: pnpm --filter @clawgame/api test
      - run: pnpm build
